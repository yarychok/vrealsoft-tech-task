services:
  postgres:
    image: postgres:16-alpine
    container_name: vrealsoft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vrealsoft
      POSTGRES_PASSWORD: vrealsoft_secret
      POSTGRES_DB: vrealsoft
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vrealsoft-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://vrealsoft:vrealsoft_secret@postgres:5432/vrealsoft
      JWT_SECRET: ${JWT_SECRET:-6o5UAI8dD9vbsQPotGWn7KOn3iuRzF}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:4000/api/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      UPLOADS_DIR: /app/uploads
    ports:
      - '4000:4000'
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    container_name: vrealsoft-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
